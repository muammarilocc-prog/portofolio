<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Muammar Portofolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
overflow:hidden;
}

/* BACKGROUND ANIMATION */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background:#ff9800;
filter:blur(200px);
opacity:0.4;
top:-200px;
left:-200px;
}

body::after{
content:"";
position:absolute;
width:500px;
height:500px;
background:#00c3ff;
filter:blur(200px);
opacity:0.4;
bottom:-200px;
right:-200px;
}

/* CONTAINER */

.container{
position:relative;
text-align:center;
max-width:700px;
padding:40px;
}

/* TITLE */

h1{
font-size:55px;
margin-bottom:20px;
}

span{
color:#ff9800;
}

/* TEXT */

p{
font-size:18px;
color:#ddd;
margin-bottom:40px;
line-height:1.6;
}

/* BUTTON */

.btn{
display:inline-block;
padding:15px 40px;
background:#ff9800;
color:black;
text-decoration:none;
border-radius:30px;
font-weight:600;
font-size:16px;
transition:0.3s;
box-shadow:0 10px 30px rgba(255,152,0,0.4);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 15px 40px rgba(255,152,0,0.6);
}

/* SMALL TEXT */

.small{
margin-top:25px;
font-size:14px;
color:#aaa;
}

/* RESPONSIVE */

@media(max-width:768px){

h1{
font-size:40px;
}

p{
font-size:16px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Halo, Saya <span>Muammar</span></h1>

<p>
Selamat datang di website portofolio saya.
Di sini Anda dapat melihat keahlian, proyek,
serta layanan yang saya tawarkan.
</p>

<a href="portofolio.html" class="btn">
Masuk ke Portofolio →
</a>

<div class="small">
Mahasiswa Sistem & Teknologi Informasi
</div>

</div>

</body>

</html>
